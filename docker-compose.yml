services:
  app:
    build: .
    expose:
      - "3000"
    volumes:
      - vcard-data:/data
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=file:/data/app.db
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file:
      - .env.production
    depends_on:
      - app
    restart: unless-stopped

volumes:
  vcard-data:
